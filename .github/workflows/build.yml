name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pytest flake8

      - name: Lint
        run: |
          flake8 calculator.py app.py --max-line-length=100 --ignore=E302,W503

      - name: Run tests
        run: |
          pytest tests/ -v
